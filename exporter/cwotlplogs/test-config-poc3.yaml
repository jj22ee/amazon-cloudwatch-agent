# POC 3 Test Config: cwotlplogs wrapper over otlphttp
#
# cwotlplogs wraps otlphttp internally. It groups ResourceLogs by service.name,
# sets client.Metadata, and delegates to otlphttp. An inline auth wrapper reads
# the metadata, sets x-aws-log-group, then delegates to sigv4auth for signing.
#
# No headers_setter or clientmetadata processor needed.

extensions:
  sigv4auth/logs:
    region: us-east-1
    service: logs

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 100
    timeout: 5s

exporters:
  cwotlplogs:
    endpoint: https://logs.us-east-1.amazonaws.com
    log_group_name: "/test/telemetry/{ServiceName}"
    log_stream_name: "default"
    auto_create: true
    auth:
      authenticator: sigv4auth/logs
    compression: gzip

  debug:
    verbosity: detailed

service:
  extensions: [sigv4auth/logs]
  pipelines:
    logs/test:
      receivers: [otlp]
      processors: [batch]
      exporters: [cwotlplogs, debug]
